services:
  archivesspace:
    image: archivesspace:latest
  traefik:
    image: traefik:v3@sha256:4299bbed850421258fc5448c2e0e6ad350981d4d335a68de11b92448aedbefe5
    command:
      - --entryPoints.web.address=:80
      - --providers.file.directory=/etc/traefik/dynamic
