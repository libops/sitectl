services:
  drupal:
    image: drupal:latest@sha256:ed37f404790e9895ad2cd6e7336851c32b48aa0912622685ff960484ad9efb68
  traefik:
    image: traefik:v3@sha256:21a3d83696379bac6434bb32e1dde0aff0e84ef2abd053ed3db87d3f45e749b2
    command:
      - --entryPoints.http.address=:80
      - --entryPoints.https.address=:443
      - --providers.file.directory=/etc/traefik/dynamic
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./conf/traefik:/etc/traefik/dynamic:ro
