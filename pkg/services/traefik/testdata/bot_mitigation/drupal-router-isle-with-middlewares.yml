http:
  middlewares:
    drupal-compress:
      compress: {}
  services:
    drupal:
      loadBalancer:
        servers:
          - url: {{ env "DRUPAL_UPSTREAM_URL" }}
  routers:
    drupal:
      rule: Host(`{{ env "DOMAIN" }}`)
      service: drupal
      middlewares:
        - drupal-compress
