services:
  traefik:
    image: traefik:v3@sha256:21a3d83696379bac6434bb32e1dde0aff0e84ef2abd053ed3db87d3f45e749b2
    command:
      - --api.dashboard=true
    volumes:
      - ./certs/cert.pem:/certs/cert.pem:ro,z
      - ./certs/privkey.pem:/certs/privkey.pem:ro,z
      - ./conf/traefik:/etc/traefik/dynamic:ro,z
    environment:
      TRAEFIK_LOG_LEVEL: INFO
  ojs:
    image: ojs
