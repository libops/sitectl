services:
  traefik:
    image: traefik:v3@sha256:4299bbed850421258fc5448c2e0e6ad350981d4d335a68de11b92448aedbefe5
    command:
      - --api.dashboard=true
    volumes:
      - ./certs/cert.pem:/certs/cert.pem:ro,z
      - ./certs/privkey.pem:/certs/privkey.pem:ro,z
      - ./conf/traefik:/etc/traefik/dynamic:ro,z
    environment:
      TRAEFIK_LOG_LEVEL: INFO
  ojs:
    image: ojs
