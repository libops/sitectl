name: goreleaser

on:
  workflow_dispatch:
    inputs:
      release-mode:
        description: Full release or recovery mode; full recovery requires an existing empty release
        required: true
        type: choice
        default: packages-only
        options:
          - packages-only
          - full
      release-version:
        description: Exact existing vMAJOR.MINOR.PATCH tag for recovery
        required: false
        type: string
  push:
    tags:
      - "*"

permissions:
  contents: write
  id-token: write

jobs:
  goreleaser:
    uses: libops/.github/.github/workflows/sitectl-plugin-goreleaser.yaml@5f44a8c8d157bb7e5cf6d9e1c98847a604e87455 # main
    permissions:
      contents: write
      id-token: write
    secrets:
      HOMEBREW_REPO: ${{ secrets.HOMEBREW_REPO }}
    with:
      go-version: "1.26.5"
      release-mode: ${{ github.ref_type == 'tag' && 'full' || inputs.release-mode }}
      release-version: ${{ inputs.release-version }}
      package-name: sitectl
